<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list</title>
  </head>
  <body>
    <ul>
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ul>

    <ol>
      <li>딸기스무디</li>
      <li>망고스무디</li>
      <li>키위스무디</li>
    </ol>

    <dl>
      <dt>딸기스무디</dt>
      <dd>- 딸기와 얼음을 갈아 만든 음료수</dd>
      <dt>키위스무디</dt>
      <dd>- 키위와 얼음을 갈아 만든 음료수</dd>
    </dl>
  </body>
</html>
